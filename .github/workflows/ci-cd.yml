name: CI-CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 JDK 1.8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: jdk
          cache: maven

      - name: Maven打包编译
        run: mvn clean package -DskipTests

      - name: 上传jar包
        uses: actions/upload-artifact@v4
        with:
          name: jar包文件
          path: target/*.jar