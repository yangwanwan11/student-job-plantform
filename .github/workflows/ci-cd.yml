name: Java CI & Build

# 触发条件：push到main分支、提交PR、支持手动触发
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch: # 手动触发按钮，方便调试

jobs:
  build:
    # 运行环境：Ubuntu 最新版
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 JDK（和你本地项目的JDK版本保持一致，这里用JDK11，可按需修改）
      - name: Set up JDK 1.8
        uses: actions/setup-java@v4
        with:
          java-version: '1.8'
          distribution: 'temurin' # 推荐的OpenJDK发行版
          cache: maven # 自动缓存Maven依赖，大幅提升后续构建速度

      # 3. 配置阿里云Maven镜像（解决国外源下载慢的问题）
      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 http://maven.apache.org/xsd/settings-1.0.0.xsd">
            <mirrors>
              <mirror>
                <id>aliyunmaven</id>
                <mirrorOf>central</mirrorOf>
                <name>Aliyun Maven Mirror</name>
                <url>https://maven.aliyun.com/repository/public</url>
              </mirror>
            </mirrors>
          </settings>
          EOF

      # 4. 执行完整的Maven构建（编译+测试+打包）
      - name: Build with Maven
        run: mvn clean package -B -DskipTests=false
        # -B：批处理模式，减少日志输出；-DskipTests=false：不跳过单元测试（可改为true跳过）

      # 5. 可选：上传构建产物（jar包），方便下载
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-jar
          path: target/*.jar